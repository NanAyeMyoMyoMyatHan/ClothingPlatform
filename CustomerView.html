<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THE BOUTIQ - Luxury Fashion Store</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* =========================
   LUXURY DESIGN SYSTEM
========================= */
:root{
    --bg:#FAF7F7;
    --white:#ffffff;
    --text:#2B2B2B;
    --primary:#E8B4B4;
    --primary-dark:#D4A5A5;
    --muted:#b08a8a;
    --shadow:0 10px 30px rgba(0,0,0,0.08);
    --radius:18px;
}

body{
    background:var(--bg);
    font-family: "Segoe UI", sans-serif;
    color:var(--text);
}

/* =========================
   HEADER
========================= */
.navbar{
    background:var(--white);
    box-shadow:var(--shadow);
    padding:15px 25px;
}

.brand{
    font-weight:800;
    letter-spacing:2px;
    font-size:22px;
}

.nav-link{
    color:var(--text) !important;
    font-weight:500;
}

.cart-badge{
    position:absolute;
    top:-6px;
    right:-10px;
    background:var(--primary-dark);
    color:white;
    font-size:12px;
    border-radius:50%;
    padding:3px 7px;
}

/* =========================
   HERO
========================= */
.hero{
    background:linear-gradient(135deg,#fff,#fbeaea);
    padding:70px 30px;
    border-radius:25px;
    margin-top:20px;
    box-shadow:var(--shadow);
}

.hero h1{
    font-size:42px;
    font-weight:800;
}

.hero p{
    color:var(--muted);
}

/* =========================
   CATEGORY FILTER
========================= */
.filter-btn{
    border:1px solid var(--primary);
    background:white;
    padding:8px 18px;
    border-radius:50px;
    margin-right:8px;
    transition:.3s;
}

.filter-btn.active,
.filter-btn:hover{
    background:var(--primary);
    color:white;
}

/* =========================
   PRODUCT CARD
========================= */
.product-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-6px);
}

.product-img{
    height:220px;
    background:linear-gradient(135deg,#f7dada,#fff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

.badge-custom{
    position:absolute;
    top:10px;
    left:10px;
    background:var(--primary-dark);
    color:white;
    font-size:12px;
    padding:5px 10px;
    border-radius:20px;
}

.price{
    font-size:18px;
    font-weight:700;
    color:var(--primary-dark);
}

.btn-add{
    background:var(--primary);
    border:none;
    width:100%;
    padding:10px;
    border-radius:12px;
    font-weight:600;
}

.btn-add:hover{
    background:var(--primary-dark);
    color:white;
}
</style>
</head>

<body>

<!-- =========================
     HEADER
========================= -->
<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">

    <a class="navbar-brand brand" href="#">THE BOUTIQ</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-4">
            <li class="nav-item"><a class="nav-link" href="#">Dresses</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Outerwear</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Traditional Tops</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Blouses</a></li>
        </ul>
    </div>

    <div class="position-relative">
        <i class="bi bi-bag fs-4"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </div>

</div>
</nav>

<!-- =========================
     MAIN CONTAINER
========================= -->
<div class="container mt-4">

<!-- HERO -->
<div class="hero text-center">
    <h1>Luxury Fashion, Redefined</h1>
    <p>Discover timeless elegance curated for modern women.</p>
</div>

<!-- FILTER -->
<div class="mt-4 text-center">
    <button class="filter-btn active" onclick="filterProducts('all')">All</button>
    <button class="filter-btn" onclick="filterProducts('dresses')">Dresses</button>
    <button class="filter-btn" onclick="filterProducts('outerwear')">Outerwear</button>
    <button class="filter-btn" onclick="filterProducts('silk')">Silk Outfits</button>
</div>

<!-- PRODUCTS -->
<div class="row mt-4" id="productGrid"></div>

</div>

<!-- =========================
     JS DATA MODEL
========================= -->
<script>

/* =========================
   PRODUCT DATABASE
========================= */
const products = [
    {
        id:1,
        name:"Floral Summer Maxi Dress",
        price:45000,
        category:"dresses",
        badge:"New"
    },
    {
        id:2,
        name:"Velvet Evening Gown",
        price:75000,
        category:"dresses",
        badge:"Best Seller"
    },
    {
        id:3,
        name:"Classic Tailored Blazer",
        price:65000,
        category:"outerwear",
        badge:"Premium"
    },
    {
        id:4,
        name:"Traditional Silk Yinzi",
        price:95000,
        category:"silk",
        badge:"Luxury"
    }
];

/* =========================
   CART STATE
========================= */
let cart = [];

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded",()=>{
    renderProducts(products);
});

/* =========================
   RENDER PRODUCTS
========================= */
function renderProducts(list){
    const grid = document.getElementById("productGrid");
    grid.innerHTML = "";

    list.forEach(p=>{
        grid.innerHTML += `
        <div class="col-md-3 mb-4">
            <div class="card product-card">

                <div class="position-relative">
                    <div class="badge-custom">${p.badge}</div>
                    <div class="product-img">
                        <i class="bi bi-image"></i>
                    </div>
                </div>

                <div class="card-body">
                    <h6>${p.name}</h6>
                    <p class="price">${p.price.toLocaleString()} MMK</p>

                    <button class="btn-add" onclick="addToCart(${p.id})">
                        Add to Bag
                    </button>
                </div>

            </div>
        </div>`;
    });
}

/* =========================
   FILTER PRODUCTS
========================= */
function filterProducts(category){
    document.querySelectorAll(".filter-btn")
        .forEach(b=>b.classList.remove("active"));

    event.target.classList.add("active");

    if(category === "all"){
        renderProducts(products);
    } else {
        renderProducts(products.filter(p=>p.category === category));
    }
}

/* =========================
   ADD TO CART (CORE LOGIC)
========================= */
function addToCart(id){
    const product = products.find(p=>p.id === id);

    let existing = cart.find(c=>c.id === id);

    if(existing){
        existing.qty += 1;
    }else{
        cart.push({...product, qty:1});
    }

    updateCartUI();
}

/* =========================
   CART UI UPDATE (SKELETON)
========================= */
function updateCartUI(){
    let totalQty = cart.reduce((sum,item)=>sum + item.qty,0);
    document.getElementById("cartCount").innerText = totalQty;
}

</script>

</body>
</html>
